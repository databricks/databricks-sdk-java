name: build

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]

permissions:
  id-token: write
  contents: read

jobs:
  fmt:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2.7.0

      - name: Cache Maven packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
        with:
          java-version: 11

      - name: Check formatting
        run: mvn --errors spotless:check

      - name: Check for JFrog proxy URLs in lockfiles
        run: |
          make fix-lockfile
          git diff --exit-code -- '**/lockfile.json'

  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: linux
            runner:
              group: databricks-protected-runner-group
              labels: linux-ubuntu-latest
          - name: macos
            runner: macos-latest
        java-version: [8, 11, 17, 20] # 20 is the latest version as of 2023 and 17 is the latest LTS

    name: "unit-tests (${{ matrix.os.name }}, java ${{ matrix.java-version }})"
    runs-on: ${{ matrix.os.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2.7.0

      - name: Cache Maven packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
        with:
          java-version: ${{ matrix.java-version }}

      - name: Check Unit Tests
        run: mvn --errors test

  # TODO: Remove this job after the lockfile is regenerated.
  regen-lockfile:
    if: github.event_name == 'pull_request'
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2.7.0
        with:
          ref: ${{ github.head_ref }}

      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
        with:
          java-version: 11

      - name: Regenerate lockfile
        run: make lock

      - name: Normalize JFrog URLs
        run: make fix-lockfile

      - name: Commit if changed
        run: |
          git diff --quiet -- '**/lockfile.json' && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '**/lockfile.json'
          git commit -m "Regenerate lockfile for commons-configuration2 2.13.0"
          git push

  check-lock:
    needs: regen-lockfile
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2.7.0
        with:
          ref: ${{ github.head_ref }}

      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
        with:
          java-version: 11

      - name: Validate lockfile
        run: make check-lock
